<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us</title>

  <!-- Requirement 3: External stylesheet -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Requirement 6: Bootstrap CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

  <!-- Requirement 2: Embedded styles affecting at least 3 tags -->
  <style>
    /* Embedded: affects <body> tag */
    body {
      background-color: #f0f0f0;
      padding: 20px;
    }

    /* Embedded: affects <h1> tag */
    h1 {
      margin-bottom: 6px;
    }

    /* Embedded: affects <label> tag */
    label {
      font-weight: 600;
      color: #333;
    }


  </style>
</head>
<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="story.html">Story</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- Inline style #1: max-width on the card container -->
  <div class="card shadow-sm mx-auto" style="max-width: 600px;">
    <div class="card-body p-4">

      <!-- Inline style #2: bottom margin on heading -->
      <h1 id="main-heading" style="margin-bottom: 4px;">Contact Us</h1>
      <p class="page-intro">Fill out the form below and we'll get back to you!</p>

      <div id="websites-list" class="mb-3" style="background:none; border:none; padding:0;">

        <div class="mb-3">
          <label for="name" class="form-label">Full Name:</label>
          <input type="text" class="form-control" id="name" placeholder="Enter your name" />
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email Address:</label>
          <input type="email" class="form-control" id="email" placeholder="Enter your email" />
        </div>

        <div class="mb-3">
          <p id="terms-box" class="section-box" style="padding: 12px 16px;">
            <strong>Do you agree to our Terms of Agreement?</strong><br><br>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="terms" id="agree" value="yes" />
              <label class="form-check-label" for="agree">Yes, I agree</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="terms" id="disagree" value="no" />
              <label class="form-check-label" for="disagree">No, I do not agree</label>
            </div>
          </p>
        </div>

        <button class="btn btn-danger" onclick="handleSubmit()">Submit</button>

        <div id="success-msg" class="alert alert-success mt-3" style="display:none;">
          ✓ Your message has been sent!
        </div>

      </div>
    </div>
  </div>

  <footer>&copy; 2026 Vinny's Homepage</footer>

  <script>
    // Resets all fields back to their default look using JavaScript style property
    function clearErrors() {
      const nameInput  = document.getElementById('name');
      const emailInput = document.getElementById('email');
      const termsBox   = document.getElementById('terms-box');

      nameInput.style.border          = '';
      nameInput.style.backgroundColor = '';

      emailInput.style.border          = '';
      emailInput.style.backgroundColor = '';

      termsBox.style.border          = '';
      termsBox.style.borderRadius    = '';
      termsBox.style.backgroundColor = '';
    }

    // Applies red border and background to an element using JavaScript style property
    function markError(element) {
      element.style.border          = '2px solid red';
      element.style.backgroundColor = '#fff5f5';
      element.style.borderRadius    = '6px';
    }

    function handleSubmit() {
      clearErrors();

      const nameInput  = document.getElementById('name');
      const emailInput = document.getElementById('email');
      const terms      = document.querySelector('input[name="terms"]:checked');
      const termsBox   = document.getElementById('terms-box');

      // Validate name first
      if (!nameInput.value.trim()) {
        markError(nameInput);
        nameInput.focus();
        return;
      }

      // Validate email second
      if (!emailInput.value.trim()) {
        markError(emailInput);
        emailInput.focus();
        return;
      }

      // Validate terms third
      if (!terms) {
        markError(termsBox);
        document.getElementById('agree').focus();
        return;
      }

      if (terms.value === 'no') {
        markError(termsBox);
        document.getElementById('agree').focus();
        alert('You must agree to the terms to submit.');
        return;
      }

      // Success — show message and reset form
      document.getElementById('success-msg').style.display = 'block';
      nameInput.value  = '';
      emailInput.value = '';
      document.querySelectorAll('input[name="terms"]').forEach(r => r.checked = false);
    }
  </script>

</body>
</html>
